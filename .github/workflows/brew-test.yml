name: Brew test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Homebrew version
        run: brew --version
      - name: Audit formula
        run: brew audit --formula Formula/codexbar-mqtt.rb
      - name: Install from source
        run: brew install --build-from-source --verbose Formula/codexbar-mqtt.rb
      - name: Test formula
        run: brew test Formula/codexbar-mqtt.rb
